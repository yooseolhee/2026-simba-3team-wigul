{% load static %}

<link rel="stylesheet" href="{% static 'css/game_result.css' %}">
<script src="https://kit.fontawesome.com/f7691a6795.js" crossorigin="anonymous"></script>


<div class="result-modal">
    <div class="result-modal-title">
        1라운드 결과
    </div>
    <div class="result-subject">
        <div class="result-subject-title">주제</div>
        <div class="result-subject-subtitle">연인과의 만남 횟수로 고민하는 당신,<br>더 선호하는 것은?</div>
        <div class="result-subject-detail">
            <button class="result-balance-a">
                <span class="result-balance-side">A</span>
                <span class="result-balance-detail">일주일에 5번 만나자는 연인</span>
            </button>
            <button class="result-balance-b">
                <span class="result-balance-side">B</span>
                <span class="result-balance-detail">한 달에 한번 만날 수 있는 연인</span>
            </button>
        </div>
    </div>
    <div class="result-score">
    <div class="result-score-title">점수</div>
        <div class="result-score-detail">
            <span class="result-score-a">3</span>
            :
            <span class="result-score-b">1</span>
        </div>
        <div class="result-side-detail">
            {% for member in room_members %}
                <div class="game_profile">
                    <img src="{% static 'images/logo_wigul.png' %}" alt="개굴" class="game_profile_img">
                    <div class="result_profile_name">
                        {{ member.user.username }}
                        {% if member.is_host %}<small style="color: #62c111; font-weight:bold;">(방장)</small>{% endif %}
                    </div>
                    <div class="result_profile_side-A">A</div>
                </div>
            {% endfor %}
        </div>
    </div>

    <div class="result-report">
        <div class="result-report-title">리포트</div>
        <div class="result-report-data">
            <div class="result-report-data-left">
                1라운드 진행
                <span class="result-report-data-right">+1°C</span>
            </div>

            <div class="result-report-data-left">
                의견 변화 횟수 - 총 1회
                <span class="result-report-data-right">+0.3°C</span>
            </div>

            <div class="result-report-data-left">
                타이머 연장 - 1회
                <span class="result-report-data-right">+0.5°C</span>
            </div>
        </div>
        <div class="result-report-detail">
            <span>10°C</span>
            <span><i class="fa-solid fa-arrow-right"></i></span>
            <span>11.5°C</span>
        </div>
    </div>
</div>
