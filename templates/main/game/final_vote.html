{% load static %}

<link rel="stylesheet" href="{% static 'css/final_vote.css' %}">

<div class="final-body" id="finalModal" style="display:none;">
    <div class="final-content">
        <div class="final-title">최종 투표</div>
        <div class="final-subtitle">당신의 SIDE를 정해주세요!</div>
        <div class="final-dsc">위굴이와 함께 당신의 SIDE를<br>표현해보세요!</div>

        <div class="final-subject">
            <div class="final-subject-title">{{ current_round.question.get_topic_display }}</div>
            <div class="final-subject-detail">{{ current_round.question_text|linebreaksbr }}</div>

            <div class="final-game-balance">
                <div class="final-game-balance-a">
                    <span class="final-game-balance-side">A</span>
                    <span class="final-game-balance-detail">{{ current_round.option_a }}</span>
                </div>
                <div class="final-game-balance-b">
                    <span class="final-game-balance-side">B</span>
                    <span class="final-game-balance-detail">{{ current_round.option_b }}</span>
                </div>
            </div>
        </div>

        <form id="finalForm"
              data-vote-url="{% url 'final_vote' room.id current_round.round_number %}"
              data-status-url="{% url 'final_status' room.id current_round.round_number %}"
              data-result-url="{% url 'result' room.id current_round.round_number %}">
            {% csrf_token %}
            <input type="hidden" name="side" id="finalSideInput" value="{{ my_side|default:'A' }}">

            <div class="my-side toggle-container">
                <div class="my-side-dsc">당신은 {{ my_side|default:'A' }} SIDE!</div>
                <div class="my-side-toggle-wrapper">
                    <img src="{% static 'images/logo_wigul.png' %}" alt="" class="frog"
                        data-sit="{% static 'images/logo_wigul.png' %}"
                        data-jump="{% static 'images/logo_wigul.png' %}"
                        data-land="{% static 'images/logo_wigul.png' %}">
                    <label class="my-side-toggle">
                        <input class="my-side-toggle-input" type="checkbox"
                            id="finalToggle"
                            {% if my_side == 'B' %}checked{% endif %}>
                        <span class="slider">
                            <span class="slider-text">{{ my_side|default:'A' }}</span>
                        </span>
                    </label>
                </div>
            </div>

            <button type="button" class="final-check" id="finalSubmitBtn">확인하기</button>

            <div class="final-waiting" id="finalWaiting" style="display:none; text-align:center; margin-top:12px;">
                다른 참여자를 기다리는 중... (<span id="voteProgress">0/0</span>)
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.getElementById('finalToggle');
    const sideInput = document.getElementById('finalSideInput');
    const form = document.getElementById('finalForm');
    const submitBtn = document.getElementById('finalSubmitBtn');
    const waiting = document.getElementById('finalWaiting');
    const progress = document.getElementById('voteProgress');

    const VOTE_URL = form.dataset.voteUrl;
    const STATUS_URL = form.dataset.statusUrl;
    const RESULT_URL = form.dataset.resultUrl;

    function getCookie(name) {
        const m = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
        return m ? m.pop() : '';
    }
    const csrftoken = getCookie('csrftoken');

    // 토글로 A/B 선택값 갱신
    if (toggle && sideInput) {
        toggle.addEventListener('change', function() {
            sideInput.value = this.checked ? 'B' : 'A';
        });
    }

    let statusInterval = null;

    function pollStatus() {
        fetch(STATUS_URL)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                progress.textContent = data.voted + '/' + data.total;
                if (data.all_done) {
                    clearInterval(statusInterval);
                    window.location.href = RESULT_URL;   // 전원 완료 → 함께 결과로
                }
            });
    }

    // 확인하기: FINAL 투표 저장 후 대기 polling 시작
    submitBtn.addEventListener('click', function() {
        const body = new URLSearchParams();
        body.append('side', sideInput.value);

        fetch(VOTE_URL, {
            method: 'POST',
            headers: {
                'X-CSRFToken': csrftoken,
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: body.toString(),
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            submitBtn.disabled = true;
            submitBtn.textContent = '투표 완료';
            waiting.style.display = 'block';
            progress.textContent = data.voted + '/' + data.total;

            if (data.all_done) {
                window.location.href = RESULT_URL;
            } else {
                pollStatus();
                statusInterval = setInterval(pollStatus, 2000);
            }
        })
        .catch(function(err) { console.error('최종 투표 실패:', err); });
    });
});
</script>
