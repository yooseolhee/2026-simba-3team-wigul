{% extends 'layouts/default-layout.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/edit_information.css' %}">

<form action="{% url 'edit' %}" method="POST" class="edit-info-container">
    {% csrf_token %}
    
    <h1 class="edit-info-page-title">정보 수정</h1>

    <div class="edit-info-section">
        <h3 class="edit-info-section-title">계정 정보</h3>
        
        <div class="edit-info-form-group">
            <label class="edit-info-label" for="usernameInput">아이디</label>
            <input type="text" id="usernameInput" class="edit-info-input readonly" value="{{ user.username|default:'simba3teamLUVU' }}" readonly>
            <p class="edit-info-help-text">아이디는 수정할 수 없습니다.</p>
        </div>
    </div>

    <div class="edit-info-divider"></div>

    <div class="edit-info-section">
        <h3 class="edit-info-section-title">비밀번호 변경</h3>
        
        <div class="edit-info-form-group">
            <label class="edit-info-label" for="currentPassword">현재 비밀번호</label>
            <input type="password" name="current_password" id="currentPassword" class="edit-info-input" placeholder="기존 비밀번호를 입력하세요..." required>
        </div>

        <div class="edit-info-form-group">
            <label class="edit-info-label" for="newPassword">새 비밀번호</label>
            <input type="password" name="new_password" id="newPassword" class="edit-info-input" placeholder="변경하실 비밀번호를 입력하세요..." required>
        </div>

        <div class="edit-info-form-group">
            <label class="edit-info-label" for="confirmPassword">새 비밀번호 확인</label>
            <input type="password" name="confirm_password" id="confirmPassword" class="edit-info-input" placeholder="변경하실 비밀번호를 다시 한 번 입력하세요..." required>
        </div>
    </div>

    <div class="bottom-btn-group">
        <button type="submit" class="primary-btn">저장하기</button>
    </div>

</form>
{% endblock %}
