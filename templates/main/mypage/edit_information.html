{% extends 'layouts/default-layout.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/edit_information.css' %}">

<div class="edit-info-container">
    <h1 class="edit-info-page-title">정보 수정</h1>

    <div class="edit-info-section">
        <h3 class="edit-info-section-title">계정 정보</h3>
        
        <div class="edit-info-form-group">
            <label class="edit-info-label">아이디</label>
            <input type="text" class="edit-info-input readonly" value="{{ user.username|default:'simba3teamLUVU' }}" readonly>
            <p class="edit-info-help-text">아이디는 수정할 수 없습니다.</p>
        </div>
    </div>

    <div class="edit-info-divider"></div>

    <div class="edit-info-section">
        <h3 class="edit-info-section-title">비밀번호 변경</h3>
        
        <div class="edit-info-form-group">
            <label class="edit-info-label">현재 비밀번호</label>
            <input type="password" class="edit-info-input" placeholder="기존 비밀번호를 입력하세요...">
        </div>

        <div class="edit-info-form-group">
            <label class="edit-info-label">새 비밀번호</label>
            <input type="password" class="edit-info-input" placeholder="변경하실 비밀번호를 입력하세요...">
        </div>

        <div class="edit-info-form-group">
            <label class="edit-info-label">새 비밀번호 확인</label>
            <input type="password" class="edit-info-input" placeholder="변경하실 비밀번호를 다시 한 번 입력하세요...">
        </div>
    </div>

</div>
{% endblock %}
