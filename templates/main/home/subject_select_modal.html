{% load static %}

<link rel="stylesheet" href="{% static 'css/subject_select_modal.css' %}">
<script src="https://kit.fontawesome.com/f7691a6795.js" crossorigin="anonymous"></script>


<div class="select-modal" id="subjectSelectModal" style="display:none;">
    <div class="select-content">
        <div class="select-title">1라운드 주제</div>
        <div class="select-subject">
            <div class="select-subject-title">사랑과 연애</div>
            <div class="select-subject-temp"><span class="mini-dot mini-yellow"></span>Yellow Level</div>
            <div class="select-subject-detail">연인과의 만남 횟수로 고민하는 당신,<br>더 선호하는 것은?</div>
            <div class="select-game-balance">
                    <a href="{% url 'game' %}" class="select-game-balance-a">
                        <span class="select-game-balance-side">A</span>
                        <span class="select-game-balance-detail">
                            일주일에 5번 만나자는 연인
                        </span>
                    </a>

                    <a href="{% url 'game' %}" class="select-game-balance-b">
                        <span class="select-game-balance-side">B</span>
                        <span class="select-game-balance-detail">
                            한 달에 한 번 만날 수 있는 연인
                        </span>
                    </a>
        </div>
    </div>
</div>
