 <button type="submit" class="primary-btn">설정 완료</button>
    <script>
// 색상 버튼
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
 
                const colorClass = btn.dataset.color;
                const preview = document.getElementById('avatarPreview');
 
                // 기존 색상 클래스 제거 후 새 클래스 추가
                preview.className = 'avatar-circle ' + colorClass;
                document.getElementById('selectedColor').value = colorClass;
            });
        });
 
        // 캐릭터 선택
        document.querySelectorAll('.char-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.char-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
 
                document.getElementById('previewImg').src = item.dataset.img;
                document.getElementById('selectedCharacter').value = item.dataset.value;
            });
        });
    </script>
