{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE, SIDE! - 로그인</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="app-container">
        <header class="page-header">
            <a href="{% url 'home' %}" class="back-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </a>
            <h2>로그인</h2>
        </header>

        <form method="POST" class="auth-form login-form">
            {% csrf_token %}
            
            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            
            <div class="input-wrapper">
                <div class="input-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="아이디를 입력하세요..."
                        class="{% if error %}error-border{% endif %}" required>
                </div>

                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요..."
                        class="{% if error %}error-border{% endif %}" required>
                
                    {% if error %}
                        <div class="error-text">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                            올바른 아이디 혹은 비밀번호를 입력하세요
                        </div>
                    {% endif %}
                </div>
            </div>

            <div class="bottom-btn-group">
                <a href="{% url 'signup' %}{% if next %}?next={{ next }}{% endif %}" class="signup-link-btn">계정이 없다면? - 회원가입</a>
                <button type="submit" class="primary-btn bottom-btn">로그인</button>
            </div>
        </form>
    </div>
</body>
</html>
